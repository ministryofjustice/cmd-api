spring:
  flyway:
    enabled: true
    locations: classpath:db/migration/h2,classpath:db/migration/general
    baselineOnMigrate: true

  jpa:
    show-sql: true

  datasource:
    url: 'jdbc:h2:mem:cmd-api-db-test;MODE=PostgreSQL'
    username: cmd
    password: dummy

  sql:
    init:
      mode: always
      continue-on-error: true

csr:
  flyway:
    enabled: true
  regions:
    - name: 1
      url: 'jdbc:h2:mem:csr-api-test;DB_CLOSE_DELAY=-1;Mode=Oracle'
      username: csr
      password: dummy
      driverClassName: org.h2.Driver
      schema: PUBLIC
    - name: 2
      url: 'jdbc:h2:mem:csr-api-test;DB_CLOSE_DELAY=-1;Mode=Oracle'
      username: csr
      password: dummy
      driverClassName: org.h2.Driver
      schema: R2

server:
  shutdown: immediate

management.endpoint:
  health.cache.time-to-live: 0
  info.cache.time-to-live: 0

application:
  notify:
    key: aaaaaaaaaa-11111111-1111-1111-1111-111111111111-11111111-1111-1111-aaaa-aaaaaaaaaaaa

api:
  health-timeout: 400ms
  base:
    url:
      hmpps-auth: http://localhost:8998/auth
      prison-api: http://localhost:8082
      csr: http://localhost:8081

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
