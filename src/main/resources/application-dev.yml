spring:

  flyway:
    locations: classpath:db/migration/h2,classpath:db/migration/general
    baselineOnMigrate: true

  jpa:
    show-sql: true

  datasource:
    url: 'jdbc:h2:mem:cmd-api-db;MODE=PostgreSQL;'
    username: cmd
    password: dummy

csr:
  flyway:
    enabled: true
  regions:
    - name: 1
      url: 'jdbc:h2:mem:csr-api-1;Mode=Oracle;'
      username: csr
      password: dummy
      driverClassName: org.h2.Driver
      schema: PUBLIC
    - name: 2
      url: 'jdbc:h2:mem:csr-api-2;Mode=Oracle;'
      username: csr
      password: dummy
      driverClassName: org.h2.Driver
      schema: PUBLIC

oauth:
  client:
    id: my-diary
    secret: clientsecret

logging:
  level:
    uk.gov: DEBUG

application:
  notify:
    key: aaaaaaaaaa-11111111-1111-1111-1111-111111111111-11111111-1111-1111-aaaa-aaaaaaaaaaaa

api.base.url:
  hmpps-auth: http://localhost:9090
  prison-api: http://localhost:8082

server:
  shutdown: immediate
