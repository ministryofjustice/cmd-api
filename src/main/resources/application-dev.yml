spring:

  flyway:
    locations: classpath:db/migration/h2,classpath:db/migration/general
    baselineOnMigrate: true

  jpa:
    show-sql: true

  datasource:
    url: 'jdbc:h2:mem:cmd-api-db;MODE=PostgreSQL;'
    username: cmd
    password: dummy

csr:
  flyway:
    enabled: true
  url: 'jdbc:h2:mem:csr-api-1;Mode=Oracle;'
  username: csr
  password: dummy
  driverClassName: org.h2.Driver
  regions:
    - name: 1
      schema: PUBLIC
    - name: 2
      schema: PUBLIC

oauth:
  client:
    id: my-diary
    secret: clientsecret

logging:
  level:
    uk.gov: DEBUG

application:
  notify:
    key: aaaaaaaaaa-11111111-1111-1111-1111-111111111111-11111111-1111-1111-aaaa-aaaaaaaaaaaa

api.base.url:
  hmpps-auth: http://localhost:9090/auth
  prison-api: http://localhost:8082

oauth.client:
  id: omicadmin
  secret: clientsecret

server:
  shutdown: immediate

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
